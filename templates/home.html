{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Home</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0a0f2c, #1a1f4c);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .container {
        width: 900px;
        height: 550px;
        display: flex;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      /* LEFT SIDE */
      .left-section {
        width: 50%;
        padding: 40px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .left-section h1 {
        margin-bottom: 10px;
      }

      .left-section p {
        margin-bottom: 25px;
        color: #ccc;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.85;
      }

      .secondary {
        background: transparent;
        border: 1px solid #00f2fe;
      }

      /* RIGHT SIDE */
      .image-section {
        width: 50%;
        background: #000;
      }

      .image-section img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left-section">
        <h1>Welcome to AI Assistant</h1>
        <p>Chat, translate, analyze and explore the power of AI.</p>

        <div class="buttons">
          <a href="/register/">
            <button>Sign Up</button>
          </a>

          <a href="/login/">
            <button class="secondary">Login</button>
          </a>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="image-section">
        <img src="{% static 'images/robot.png' %}" alt="AI Robot" />
      </div>
    </div>
  </body>
</html>
