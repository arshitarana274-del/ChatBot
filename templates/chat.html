{% load static %}
<!doctype html>
<html>
  <head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        width: 100vw;
        background: #0a0f2c;
        overflow: hidden;
        color: white;
      }

      /* MAIN LAYOUT */
      .main-container {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      /* SIDEBAR */
      .sidebar {
        width: 260px;
        background: rgba(255, 255, 255, 0.05);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        padding: 15px;
        display: flex;
        flex-direction: column;
      }

      .sidebar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .new-chat {
        color: #00f2fe;
        text-decoration: none;
        font-size: 14px;
      }

      .session-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
      }

      .session {
        padding: 10px;
        border-radius: 10px;
        text-decoration: none;
        color: #ccc;
        background: rgba(255, 255, 255, 0.05);
        font-size: 13px;
        transition: 0.2s;
      }

      .session:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      .session.active {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
      }

      /* CHAT AREA */
      .chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(20px);
        position: relative;
      }

      .chat-header {
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.08);
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      .status {
        font-size: 12px;
        color: #aaa;
      }

      .online {
        color: #00ffae;
      }

      /* TASK BAR */
      .task-bar {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px 14px;
        background: rgb(67 72 110);
        border-radius: 14px;
        z-index: 5;
      }

      .task {
        padding: 6px 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: #ddd;
        font-size: 12px;
        cursor: pointer;
      }

      .task.active {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
      }
      .logout a {
        color: #09e9fe;
        font-size: 14px;
      }
      .logout a:hover {
        color: red;
      }
      #chat-box {
        flex: 1;
        padding: 100px 12px 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .message {
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
        max-width: 600px;
        width: fit-content;
      }

      .user {
        align-self: flex-end;
        max-width: 40%;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
      }

      .bot {
        align-self: flex-start;
        max-width: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: #ddd;
      }

      /* INPUT */
      .chat-input {
        display: flex;
        padding: 10px;
        background: rgba(255, 255, 255, 0.08);
      }

      .chat-input input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .chat-input button {
        margin-left: 8px;
        width: 40px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
        cursor: pointer;
      }

      .logout {
        position: absolute;
        top: 15px;
        right: 20px;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h3>Chats</h3>
          <a href="/chat/new/" class="new-chat">+ New</a>
        </div>

        <div class="session-list">
          {% for session in sessions %}
          <a
            href="/chat/{{ session.id }}/"
            class="session {% if session.id == current_session.id %}active{% endif %}"
          >
            {{ session.title|default_if_none:"New Chat"|default:"New Chat" }}
          </a>
          {% empty %}
          <p>No chats</p>
          {% endfor %}
        </div>
      </div>

      <!-- CHAT -->
      <div class="chat-container">
        <div class="chat-header">
          <div class="avatar">AI</div>
          <div>
            <div>AI Assistant</div>
            <div class="status"><span class="online">●</span> Online</div>
          </div>
        </div>

        <!-- TASK BAR -->
        <div class="task-bar">
          <button id="chat-btn" class="task active">Chat</button>
          <button id="sentiment-btn" class="task">Sentiment</button>
          <button id="summarize-btn" class="task">Summarize</button>
          <button id="generate-btn" class="task">Generate</button>
          <button id="translate-btn" class="task">Translate</button>
        </div>

        <!-- CHAT BOX -->
        <div id="chat-box">
          {% for msg in history %}
          <div
            class="message {% if msg.role == 'user' %}user{% else %}bot{% endif %}"
          >
            {{ msg.content }}
          </div>
          {% endfor %}
        </div>

        <!-- INPUT -->
        <form id="chat-form" class="chat-input">
          <input
            type="text"
            id="message"
            placeholder="Ask anything..."
            required
          />
          <button>➤</button>
        </form>

        <div class="logout">
          <a href="/logout/">Logout</a>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message");
      const chatBox = document.getElementById("chat-box");

      let currentTask = "chat";

      document.querySelectorAll(".task").forEach((btn) => {
        btn.onclick = () => {
          document
            .querySelectorAll(".task")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          currentTask = btn.innerText.toLowerCase();
        };
      });

      form.onsubmit = function (e) {
        e.preventDefault();

        let message = input.value.trim();
        if (!message) return;

        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        input.value = "";

        let parts = window.location.pathname.split("/");
        let sessionId = parts.length > 2 ? parts[2] : null;

        let url = `/chat/get-${currentTask}/`;
        if (currentTask === "chat") url = "/chat/get-response/";

        fetch(
          `${url}?message=${encodeURIComponent(message)}&session_id=${sessionId}`,
        )
          .then((res) => res.json())
          .then((data) => {
            let response = data.response;

            if (typeof response === "object") {
              chatBox.innerHTML += `<div class="message bot">${response.label} (${response.score})</div>`;
            } else {
              chatBox.innerHTML += `<div class="message bot">${response}</div>`;
            }

            chatBox.scrollTop = chatBox.scrollHeight;
          });
      };
    </script>
  </body>
</html>
