<!doctype html>
<html>
  <head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        width: 100vw;
        background: #0a0f2c;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: absolute;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(
          circle,
          rgba(79, 172, 254, 0.3),
          transparent 60%
        );
        filter: blur(120px);
        animation: floatGlow 8s ease-in-out infinite alternate;
      }

      @keyframes floatGlow {
        from {
          transform: translate(-100px, -100px);
        }
        to {
          transform: translate(100px, 100px);
        }
      }

      .chat-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
      }

      /* HEADER */
      .chat-header {
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
      }

      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }

      .status {
        font-size: 12px;
        color: #aaa;
      }

      .online {
        color: #00ffae;
      }

      /* 🔥 FLOATING TASK BAR */
      .task-bar {
        position: absolute;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        padding: 8px 14px;
        background: rgb(67 72 110);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        z-index: 5;
      }

      .task {
        padding: 6px 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: #ddd;
        font-size: 12px;
        cursor: pointer;
        transition: 0.2s;
      }

      .task:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.15);
      }

      .task.active {
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
      }

      /* CHAT */
      #chat-box {
        flex: 1;
        padding: 120px 14px 14px; /* space for floating bar */
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 14px;
        white-space: pre-wrap;
        width: fit-content;
      }

      .user {
        align-self: flex-end;
        max-width: 40%;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
      }

      .bot {
        align-self: flex-start;
        max-width: 50%;
        background: rgba(255, 255, 255, 0.1);
        color: #ddd;
      }

      /* typing */
      .typing {
        display: flex;
        gap: 5px;
      }

      .dot {
        width: 6px;
        height: 6px;
        background: #aaa;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      /* INPUT */
      .chat-input {
        display: flex;
        padding: 10px;
        background: rgba(255, 255, 255, 0.08);
      }

      .chat-input input {
        flex: 1;
        padding: 10px;
        border-radius: 20px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        outline: none;
      }

      .chat-input button {
        margin-left: 8px;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }

      .chat-input button:hover {
        transform: scale(1.1);
      }

      /* LOGOUT */
      .logout {
        position: absolute;
        top: 15px;
        right: 20px;
      }

      .logout a {
        color: #00f2fe;
        text-decoration: none;
        font-size: 13px;
      }

      .logout a:hover {
        color: red;
      }
    </style>
  </head>

  <body>
    <div class="chat-container">
      <div class="chat-header">
        <div class="avatar">AI</div>
        <div>
          <div>AI Assistant</div>
          <div class="status"><span class="online">●</span> Online</div>
        </div>
      </div>

      <!-- 🔥 FLOATING BUTTONS -->
      <div class="task-bar">
        <button id="chat-btn" class="task active">Chat</button>
        <button id="sentiment-btn" class="task">Sentiment</button>
        <button id="summarize-btn" class="task">Summarize</button>
        <button id="generate-btn" class="task">Generate</button>
        <button id="translate-btn" class="task">Translate</button>
      </div>

      <div id="chat-box"></div>

      <form id="chat-form" class="chat-input">
        <input
          type="text"
          id="message"
          placeholder="Ask anything..."
          required
        />
        <button>➤</button>
      </form>

      <div class="logout">
        <a href="/logout/">Logout</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message");
      const chatBox = document.getElementById("chat-box");

      let currentTask = "chat";

      document.querySelectorAll(".task").forEach((btn) => {
        btn.onclick = () => {
          document
            .querySelectorAll(".task")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          if (btn.id === "sentiment-btn") {
            currentTask = "sentiment";
          } else if (btn.id === "summarize-btn") {
            currentTask = "summarize";
          } else if (btn.id === "translate-btn") {
            currentTask = "translate";
          } else if (btn.id === "generate-btn") {
            currentTask = "generate";
          } else {
            currentTask = "chat";
          }
        };
      });

      form.onsubmit = function (e) {
        e.preventDefault();

        let message = input.value.trim();
        if (!message) return;

        chatBox.innerHTML += `<div class="message user">${message}</div>`;
        input.value = "";

        let typing = document.createElement("div");
        typing.className = "message bot typing";
        typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
        chatBox.appendChild(typing);

        chatBox.scrollTop = chatBox.scrollHeight;

        let url = "";

        if (currentTask === "sentiment") {
          url = "/chat/get-sentiment/";
        } else if (currentTask === "summarize") {
          url = "/chat/get-summary/";
        } else if (currentTask === "translate") {
          url = "/chat/get-translation/";
        } else if (currentTask === "generate") {
          url = "/chat/get-generation/";
        } else {
          url = "/chat/get-response/";
        }
        fetch(`${url}?message=${encodeURIComponent(message)}`)
          .then((res) => res.json())
          .then((data) => {
            typing.remove();
            chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
          })
          .catch((err) => {
            typing.remove();
            chatBox.innerHTML += `<div class="message bot">Error occurred</div>`;
          });
      };
    </script>
  </body>
</html>
