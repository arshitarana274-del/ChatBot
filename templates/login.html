{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0a0f2c, #1a1f4c);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .container {
        width: 900px;
        height: 550px;
        display: flex;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }

      /* LEFT SIDE */
      .form-section {
        width: 50%;
        padding: 40px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
      }

      .form-section h1 {
        margin-bottom: 10px;
      }

      .form-section p {
        margin-bottom: 25px;
        color: #ccc;
      }

      form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: none;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      form input::placeholder {
        color: #aaa;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        opacity: 0.85;
      }

      .register {
        margin-top: 20px;
        font-size: 14px;
      }

      .register a {
        color: #00f2fe;
        text-decoration: none;
      }

      /* RIGHT SIDE */
      .image-section {
        width: 50%;
        background: #000;
      }

      .image-section img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- LOGIN FORM -->
      <div class="form-section">
        <h1>Welcome Back</h1>
        <p>Login to continue your AI journey.</p>

        {% if error %}
        <p style="color: #ff6b6b; margin-bottom: 15px">{{ error }}</p>
        {% endif %}
        <form method="POST">
          {% csrf_token %}
          <input type="text" name="username" placeholder="Username" required />
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />

          <button type="submit">Login</button>
        </form>

        <div class="register">
          Don’t have an account? <a href="/register/">Sign Up</a>
        </div>
      </div>

      <!-- IMAGE -->
      <div class="image-section">
        <img src="{% static 'images/robot.png' %}" alt="AI Robot" />
      </div>
    </div>
  </body>
</html>
